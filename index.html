<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Income Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg:       linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --ink:      #0f172a;
            --ink-2:    #475569;
            --ink-3:    #94a3b8;
            --border:   #e2e8f0;
            --border-2: #cbd5e1;
            --card:     #ffffff;
            --red:      #ef4444;
            --radius:   14px;
            --shadow:   0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
            --shadow-lg:0 4px 6px rgba(0,0,0,.05), 0 16px 48px rgba(0,0,0,.1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--ink);
        }

        /* ─── Lock Screen ─────────────────────────────────────────── */
        #lockScreen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            background-attachment: fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            padding: 24px;
        }

        #lockScreen.hidden { display: none; }

        .lock-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 32px 32px;
            width: 100%;
            max-width: 360px;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .lock-wordmark {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--ink-3);
            margin-bottom: 32px;
        }

        .lock-icon {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            background: var(--ink);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .lock-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 6px;
        }

        .lock-subtitle {
            font-size: 14px;
            color: var(--ink-2);
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .lock-input {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--border-2);
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            text-align: center;
            letter-spacing: 6px;
            color: var(--ink);
            background: #f8fafc;
            margin-bottom: 12px;
            transition: border-color .2s, box-shadow .2s;
        }

        .lock-input:focus {
            outline: none;
            border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(15,23,42,.08);
            background: white;
        }

        .lock-btn {
            width: 100%;
            padding: 14px;
            background: var(--ink);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
            margin-bottom: 10px;
        }

        .lock-btn:active { opacity: .8; }

        .lock-error {
            color: var(--red);
            font-size: 13px;
            min-height: 18px;
        }

        /* ─── App shell ───────────────────────────────────────────── */
        #app { display: none; }
        #app.visible { display: block; }

        /* ─── Top nav ─────────────────────────────────────────────── */
        .topnav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            background: rgba(248,250,252,.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topnav-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink);
        }

        .topnav-lock {
            background: none;
            border: 1.5px solid var(--border-2);
            border-radius: 8px;
            padding: 7px 14px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-2);
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }

        .topnav-lock:hover {
            border-color: var(--ink);
            color: var(--ink);
        }

        /* ─── Page content ────────────────────────────────────────── */
        .page {
            max-width: 520px;
            margin: 0 auto;
            padding: 28px 20px 80px;
        }

        /* ─── Total banner ────────────────────────────────────────── */
        .total-banner {
            background: var(--ink);
            border-radius: 18px;
            padding: 28px 28px 24px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .total-banner::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 160px; height: 160px;
            border-radius: 50%;
            background: rgba(255,255,255,.04);
        }

        .total-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: rgba(255,255,255,.5);
            margin-bottom: 8px;
        }

        .total-amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 44px;
            font-weight: 700;
            color: white;
            line-height: 1;
        }

        /* ─── Cards ───────────────────────────────────────────────── */
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--ink-3);
            margin-bottom: 20px;
        }

        /* ─── Form ────────────────────────────────────────────────── */
        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-2);
            margin-bottom: 7px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid var(--border-2);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: var(--ink);
            background: #f8fafc;
            transition: border-color .2s, box-shadow .2s, background .2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(15,23,42,.07);
            background: white;
        }

        textarea.form-input {
            resize: vertical;
            min-height: 72px;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background: var(--ink);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s;
            margin-top: 4px;
        }

        .btn-primary:active { opacity: .8; }

        /* ─── Export button ───────────────────────────────────────── */
        .btn-outline {
            width: 100%;
            padding: 13px;
            background: transparent;
            color: var(--ink-2);
            border: 1.5px solid var(--border-2);
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: border-color .15s, color .15s;
            margin-bottom: 20px;
        }

        .btn-outline:hover {
            border-color: var(--ink);
            color: var(--ink);
        }

        /* ─── Entry cards ─────────────────────────────────────────── */
        .entry-list { display: flex; flex-direction: column; gap: 10px; }

        .entry-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            box-shadow: var(--shadow);
        }

        .entry-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 6px;
        }

        .entry-job {
            font-size: 15px;
            font-weight: 500;
            color: var(--ink);
            flex: 1;
            line-height: 1.4;
        }

        .entry-amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--ink);
            white-space: nowrap;
        }

        .entry-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .entry-date {
            font-size: 12px;
            color: var(--ink-3);
            font-weight: 400;
        }

        .entry-actions {
            display: flex;
            gap: 6px;
        }

        .btn-sm {
            padding: 5px 12px;
            border-radius: 7px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            border: 1.5px solid var(--border-2);
            background: transparent;
            color: var(--ink-2);
            transition: border-color .15s, color .15s;
        }

        .btn-sm:hover { border-color: var(--ink); color: var(--ink); }

        .btn-sm-danger {
            border-color: #fecaca;
            color: var(--red);
            background: #fff5f5;
        }

        .btn-sm-danger:hover { border-color: var(--red); background: #fee2e2; }

        /* ─── Entry edit mode ─────────────────────────────────────── */
        .entry-edit { display: flex; flex-direction: column; gap: 10px; }

        .entry-edit-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .entry-edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 2px;
        }

        .btn-save {
            flex: 1;
            padding: 10px;
            background: var(--ink);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            padding: 10px 16px;
            background: transparent;
            color: var(--ink-2);
            border: 1.5px solid var(--border-2);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        /* ─── Empty state ─────────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--ink-3);
            font-size: 14px;
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        /* ─── Section label ───────────────────────────────────────── */
        .section-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--ink-3);
            margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <!-- ── Lock Screen ────────────────────────────────────────────── -->
    <div id="lockScreen">
        <div class="lock-card">
            <div class="lock-wordmark">Income Tracker</div>
            <div class="lock-icon" id="lockIcon">🔐</div>
            <div class="lock-title" id="lockTitle">Welcome back</div>
            <div class="lock-subtitle" id="lockSubtitle">Enter your password to continue</div>
            <input type="password" id="lockInput" class="lock-input" placeholder="••••••••" autocomplete="current-password">
            <button class="lock-btn" id="lockActionBtn" onclick="handleLockAction()">Unlock</button>
            <div class="lock-error" id="lockError"></div>
        </div>
    </div>

    <!-- ── App ────────────────────────────────────────────────────── -->
    <div id="app">
        <nav class="topnav">
            <span class="topnav-brand">Income Tracker</span>
            <button class="topnav-lock" onclick="lockApp()">Lock</button>
        </nav>

        <div class="page">

            <!-- Total -->
            <div class="total-banner">
                <div class="total-label">Total Income</div>
                <div class="total-amount" id="totalAmount">€0.00</div>
            </div>

            <!-- Add entry -->
            <div class="card">
                <div class="card-title">New Entry</div>
                <form id="incomeForm">
                    <div class="form-group">
                        <label class="form-label">Date</label>
                        <input type="date" id="dateInput" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Amount (EUR)</label>
                        <input type="number" id="amountInput" class="form-input" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Job / Source</label>
                        <textarea id="jobInput" class="form-input" placeholder="e.g., Casino blog article" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Add Entry</button>
                </form>
            </div>

            <!-- Export -->
            <button class="btn-outline" onclick="exportToCSV()">Export to CSV</button>

            <!-- Entries -->
            <div class="section-label">Entries</div>
            <div class="entry-list" id="entriesList"></div>

        </div>
    </div>

    <script>
        // ── SHA-256 helper ───────────────────────────────────────────
        async function sha256(text) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ── Lock screen ──────────────────────────────────────────────
        let _firstTime = !localStorage.getItem('pwHash');

        function initLockUI() {
            if (_firstTime) {
                document.getElementById('lockIcon').textContent = '🔑';
                document.getElementById('lockTitle').textContent = 'Create a password';
                document.getElementById('lockSubtitle').textContent = 'Choose a password to protect your income data';
                document.getElementById('lockActionBtn').textContent = 'Set Password';
                document.getElementById('lockInput').placeholder = 'Choose a password';
            }
        }

        initLockUI();

        document.getElementById('lockInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLockAction();
        });

        async function handleLockAction() {
            const val = document.getElementById('lockInput').value;
            const errEl = document.getElementById('lockError');
            errEl.textContent = '';

            if (!val) { errEl.textContent = 'Please enter a password.'; return; }

            if (_firstTime) {
                if (val.length < 4) { errEl.textContent = 'Use at least 4 characters.'; return; }
                localStorage.setItem('pwHash', await sha256(val));
                _firstTime = false;
                unlockApp();
            } else {
                if (await sha256(val) === localStorage.getItem('pwHash')) {
                    unlockApp();
                } else {
                    errEl.textContent = 'Incorrect password.';
                    document.getElementById('lockInput').value = '';
                    document.getElementById('lockInput').focus();
                }
            }
        }

        function unlockApp() {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('app').classList.add('visible');
            document.getElementById('dateInput').valueAsDate = new Date();
            renderEntries();
        }

        function lockApp() {
            document.getElementById('app').classList.remove('visible');
            document.getElementById('lockScreen').classList.remove('hidden');
            document.getElementById('lockInput').value = '';
            document.getElementById('lockError').textContent = '';
            document.getElementById('lockIcon').textContent = '🔐';
            document.getElementById('lockTitle').textContent = 'Welcome back';
            document.getElementById('lockSubtitle').textContent = 'Enter your password to continue';
            document.getElementById('lockActionBtn').textContent = 'Unlock';
        }

        // ── Data ─────────────────────────────────────────────────────
        function loadEntries() {
            return JSON.parse(localStorage.getItem('incomeEntries') || '[]')
                .sort((a, b) => new Date(b.date) - new Date(a.date));
        }

        function saveEntries(entries) {
            localStorage.setItem('incomeEntries', JSON.stringify(entries));
        }

        function formatDate(d) {
            return new Date(d).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }

        // ── Render ───────────────────────────────────────────────────
        function renderEntries() {
            const entries = loadEntries();
            const container = document.getElementById('entriesList');
            const total = entries.reduce((s, e) => s + parseFloat(e.amount), 0);
            document.getElementById('totalAmount').textContent = '€' + total.toFixed(2);

            if (!entries.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        No entries yet. Add your first one above.
                    </div>`;
                return;
            }

            container.innerHTML = entries.map((e, i) => `
                <div class="entry-card" id="ecard-${i}">
                    <div id="eview-${i}">
                        <div class="entry-top">
                            <span class="entry-job">${escHtml(e.job)}</span>
                            <span class="entry-amount">€${parseFloat(e.amount).toFixed(2)}</span>
                        </div>
                        <div class="entry-meta">
                            <span class="entry-date">${formatDate(e.date)}</span>
                            <div class="entry-actions">
                                <button class="btn-sm" onclick="startEdit(${i})">Edit</button>
                                <button class="btn-sm btn-sm-danger" onclick="deleteEntry(${i})">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ── Edit ─────────────────────────────────────────────────────
        function startEdit(i) {
            const entries = loadEntries();
            const e = entries[i];
            document.getElementById(`eview-${i}`).outerHTML = `
                <div id="eedit-${i}" class="entry-edit">
                    <div class="entry-edit-row">
                        <div>
                            <label class="form-label">Date</label>
                            <input type="date" id="edit-date-${i}" class="form-input" value="${e.date}">
                        </div>
                        <div>
                            <label class="form-label">Amount (EUR)</label>
                            <input type="number" id="edit-amount-${i}" class="form-input" value="${e.amount}" step="0.01" min="0">
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Job / Source</label>
                        <textarea id="edit-job-${i}" class="form-input">${escHtml(e.job)}</textarea>
                    </div>
                    <div class="entry-edit-actions">
                        <button class="btn-save" onclick="saveEdit(${i})">Save</button>
                        <button class="btn-cancel" onclick="renderEntries()">Cancel</button>
                    </div>
                </div>`;
        }

        function saveEdit(i) {
            const date   = document.getElementById(`edit-date-${i}`).value;
            const amount = document.getElementById(`edit-amount-${i}`).value;
            const job    = document.getElementById(`edit-job-${i}`).value.trim();

            if (!date || !amount || !job) return;

            const entries = loadEntries();
            entries[i] = { date, amount, job };
            saveEntries(entries);
            renderEntries();
        }

        // ── Add entry ────────────────────────────────────────────────
        document.getElementById('incomeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const entry = {
                date:   document.getElementById('dateInput').value,
                amount: document.getElementById('amountInput').value,
                job:    document.getElementById('jobInput').value.trim()
            };
            const entries = loadEntries();
            entries.push(entry);
            saveEntries(entries);
            document.getElementById('amountInput').value = '';
            document.getElementById('jobInput').value = '';
            document.getElementById('dateInput').valueAsDate = new Date();
            renderEntries();
            if (navigator.vibrate) navigator.vibrate(40);
        });

        // ── Delete ───────────────────────────────────────────────────
        function deleteEntry(i) {
            if (!confirm('Delete this entry?')) return;
            const entries = loadEntries();
            entries.splice(i, 1);
            saveEntries(entries);
            renderEntries();
        }

        // ── Export ───────────────────────────────────────────────────
        function exportToCSV() {
            const entries = loadEntries();
            if (!entries.length) { alert('No entries to export.'); return; }
            let csv = 'Date,Amount (EUR),Job/Source\n';
            entries.forEach(e => { csv += `${e.date},${e.amount},"${e.job.replace(/"/g,'""')}"\n`; });
            const a = Object.assign(document.createElement('a'), {
                href: URL.createObjectURL(new Blob([csv], { type: 'text/csv' })),
                download: `income-${new Date().toISOString().slice(0,10)}.csv`
            });
            a.click();
        }
    </script>
</body>
</html>
