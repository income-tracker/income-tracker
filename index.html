<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Income Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --ink:       #0f172a;
            --ink-2:     #475569;
            --ink-3:     #94a3b8;
            --border:    #e2e8f0;
            --border-2:  #cbd5e1;
            --card:      #ffffff;
            --red:       #ef4444;
            --radius:    14px;
            --shadow:    0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.06);
            --shadow-lg: 0 4px 6px rgba(0,0,0,.05), 0 16px 48px rgba(0,0,0,.1);
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--ink);
        }

        /* ─── Lock Screen ─────────────────────────────────────── */
        #lockScreen {
            position: fixed; inset: 0;
            background: var(--bg); background-attachment: fixed;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; padding: 24px;
        }
        #lockScreen.hidden { display: none; }

        .lock-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 40px 32px 32px;
            width: 100%; max-width: 360px;
            box-shadow: var(--shadow-lg); text-align: center;
        }
        .lock-wordmark {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: .12em; text-transform: uppercase;
            color: var(--ink-3); margin-bottom: 32px;
        }
        .lock-icon {
            width: 52px; height: 52px; border-radius: 14px;
            background: var(--ink); color: white; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .lock-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px; font-weight: 700; color: var(--ink); margin-bottom: 6px;
        }
        .lock-subtitle { font-size: 14px; color: var(--ink-2); margin-bottom: 28px; line-height: 1.5; }
        .lock-input {
            width: 100%; padding: 13px 16px;
            border: 1.5px solid var(--border-2); border-radius: var(--radius);
            font-family: 'Inter', sans-serif; font-size: 16px;
            text-align: center; letter-spacing: 6px;
            color: var(--ink); background: #f8fafc;
            margin-bottom: 12px;
            transition: border-color .2s, box-shadow .2s;
            -webkit-appearance: none;
        }
        .lock-input:focus {
            outline: none; border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(15,23,42,.08); background: white;
        }
        .lock-btn {
            width: 100%; padding: 14px;
            background: var(--ink); color: white; border: none;
            border-radius: var(--radius); font-family: 'Inter', sans-serif;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: opacity .15s; margin-bottom: 10px;
        }
        .lock-btn:active { opacity: .8; }
        .lock-error { color: var(--red); font-size: 13px; min-height: 18px; }

        /* ─── App ─────────────────────────────────────────────── */
        #app { display: none; }
        #app.visible { display: block; }

        .topnav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 24px; border-bottom: 1px solid var(--border);
            background: rgba(248,250,252,.85); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }
        .topnav-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase; color: var(--ink);
        }
        .topnav-right { display: flex; align-items: center; gap: 10px; }
        .sync-status { display: flex; align-items: center; gap: 5px; }
        .sync-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--ink-3); transition: background .3s;
        }
        .sync-dot.synced  { background: #22c55e; }
        .sync-dot.syncing { background: #f59e0b; }
        .sync-dot.error   { background: var(--red); }
        .sync-label { font-size: 12px; color: var(--ink-3); }
        .topnav-lock {
            background: none; border: 1.5px solid var(--border-2);
            border-radius: 8px; padding: 7px 14px;
            font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
            color: var(--ink-2); cursor: pointer;
            transition: border-color .15s, color .15s;
        }
        .topnav-lock:hover { border-color: var(--ink); color: var(--ink); }

        .page { max-width: 520px; margin: 0 auto; padding: 28px 20px 80px; }

        /* ─── Total ───────────────────────────────────────────── */
        .total-banner {
            background: var(--ink); border-radius: 18px;
            padding: 28px 28px 24px; margin-bottom: 20px;
            position: relative; overflow: hidden;
        }
        .total-banner::before {
            content: ''; position: absolute;
            top: -40px; right: -40px; width: 160px; height: 160px;
            border-radius: 50%; background: rgba(255,255,255,.04);
        }
        .total-label {
            font-size: 12px; font-weight: 600; letter-spacing: .1em;
            text-transform: uppercase; color: rgba(255,255,255,.5); margin-bottom: 8px;
        }
        .total-amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 44px; font-weight: 700; color: white; line-height: 1;
        }

        /* ─── Cards ───────────────────────────────────────────── */
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 24px; margin-bottom: 16px;
            box-shadow: var(--shadow);
        }
        .card-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: .08em; text-transform: uppercase;
            color: var(--ink-3); margin-bottom: 20px;
        }

        /* ─── Form ────────────────────────────────────────────── */
        .form-group { margin-bottom: 16px; }
        .form-group:last-child { margin-bottom: 0; }
        .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--ink-2); margin-bottom: 7px; }
        .form-input {
            width: 100%;
            /* explicit height keeps date input aligned on iOS/iPad */
            height: 46px;
            padding: 0 14px;
            border: 1.5px solid var(--border-2); border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 15px;
            color: var(--ink); background: #f8fafc;
            transition: border-color .2s, box-shadow .2s, background .2s;
            -webkit-appearance: none;
            display: flex; align-items: center;
        }
        .form-input:focus {
            outline: none; border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(15,23,42,.07); background: white;
        }
        textarea.form-input {
            height: auto; min-height: 72px; padding: 12px 14px;
            resize: vertical; line-height: 1.5;
        }
        .btn-primary {
            width: 100%; padding: 14px;
            background: var(--ink); color: white; border: none;
            border-radius: 10px; font-family: 'Inter', sans-serif;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: opacity .15s; margin-top: 4px;
        }
        .btn-primary:active { opacity: .8; }

        .btn-outline {
            width: 100%; padding: 13px;
            background: transparent; color: var(--ink-2);
            border: 1.5px solid var(--border-2); border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: border-color .15s, color .15s; margin-bottom: 20px;
        }
        .btn-outline:hover { border-color: var(--ink); color: var(--ink); }

        /* ─── Entry cards ─────────────────────────────────────── */
        .entry-list { display: flex; flex-direction: column; gap: 10px; }
        .entry-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 18px 20px; box-shadow: var(--shadow);
        }
        .entry-top {
            display: flex; justify-content: space-between;
            align-items: flex-start; gap: 12px; margin-bottom: 6px;
        }
        .entry-job { font-size: 15px; font-weight: 500; color: var(--ink); flex: 1; line-height: 1.4; }
        .entry-amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px; font-weight: 700; color: var(--ink); white-space: nowrap;
        }
        .entry-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
        .entry-date { font-size: 12px; color: var(--ink-3); }
        .entry-actions { display: flex; gap: 6px; }

        .btn-sm {
            padding: 5px 12px; border-radius: 7px;
            font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;
            cursor: pointer; border: 1.5px solid var(--border-2);
            background: transparent; color: var(--ink-2);
            transition: border-color .15s, color .15s;
        }
        .btn-sm:hover { border-color: var(--ink); color: var(--ink); }
        .btn-sm-danger { border-color: #fecaca; color: var(--red); background: #fff5f5; }
        .btn-sm-danger:hover { border-color: var(--red); background: #fee2e2; }

        /* ─── Entry edit mode ─────────────────────────────────── */
        .entry-edit { display: flex; flex-direction: column; gap: 10px; }
        .entry-edit-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .entry-edit-actions { display: flex; gap: 8px; margin-top: 2px; }
        .btn-save {
            flex: 1; padding: 10px; background: var(--ink); color: white;
            border: none; border-radius: 8px; font-family: 'Inter', sans-serif;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .btn-cancel {
            padding: 10px 16px; background: transparent; color: var(--ink-2);
            border: 1.5px solid var(--border-2); border-radius: 8px;
            font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer;
        }

        /* ─── Misc ────────────────────────────────────────────── */
        .empty-state { text-align: center; padding: 40px 20px; color: var(--ink-3); font-size: 14px; }
        .empty-icon  { font-size: 32px; margin-bottom: 10px; }
        .section-label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px; font-weight: 700;
            letter-spacing: .1em; text-transform: uppercase;
            color: var(--ink-3); margin-bottom: 12px;
        }
    </style>
</head>
<body>

    <!-- Lock Screen -->
    <div id="lockScreen">
        <div class="lock-card">
            <div class="lock-wordmark">Income Tracker</div>
            <div class="lock-icon" id="lockIcon">🔐</div>
            <div class="lock-title" id="lockTitle">Welcome back</div>
            <div class="lock-subtitle" id="lockSubtitle">Enter your password to continue</div>
            <input type="password" id="lockInput" class="lock-input" placeholder="••••••••" autocomplete="current-password">
            <button class="lock-btn" id="lockBtn">Unlock</button>
            <div class="lock-error" id="lockError"></div>
        </div>
    </div>

    <!-- App -->
    <div id="app">
        <nav class="topnav">
            <span class="topnav-brand">Income Tracker</span>
            <div class="topnav-right">
                <div class="sync-status">
                    <span class="sync-dot" id="syncDot"></span>
                    <span class="sync-label" id="syncLabel"></span>
                </div>
                <button class="topnav-lock" id="lockAppBtn">Lock</button>
            </div>
        </nav>

        <div class="page">
            <div class="total-banner">
                <div class="total-label">Total Income</div>
                <div class="total-amount" id="totalAmount">€0.00</div>
            </div>

            <div class="card">
                <div class="card-title">New Entry</div>
                <form id="incomeForm">
                    <div class="form-group">
                        <label class="form-label" for="dateInput">Date</label>
                        <input type="date" id="dateInput" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="amountInput">Amount (EUR)</label>
                        <input type="number" id="amountInput" class="form-input" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="jobInput">Job / Source</label>
                        <textarea id="jobInput" class="form-input" placeholder="e.g., Casino blog article" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Add Entry</button>
                </form>
            </div>

            <button class="btn-outline" id="exportBtn">Export to CSV</button>

            <div class="section-label">Entries</div>
            <div class="entry-list" id="entriesList"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp }                                    from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, update, remove, onValue } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        // ── Firebase ───────────────────────────────────────────────
        const db = getDatabase(initializeApp({
            apiKey:            "AIzaSyDM8q5F5rLduKY4Yic-65bmsROIkE5I8Cc",
            authDomain:        "income-tracker-c9bd7.firebaseapp.com",
            databaseURL:       "https://income-tracker-c9bd7-default-rtdb.firebaseio.com",
            projectId:         "income-tracker-c9bd7",
            storageBucket:     "income-tracker-c9bd7.firebasestorage.app",
            messagingSenderId: "845846498673",
            appId:             "1:845846498673:web:d2fffa7c9c3100a9073ad0"
        }));
        const entriesRef = ref(db, 'entries');

        // ── Helpers ────────────────────────────────────────────────
        async function sha256(text) {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
            return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
        }
        function esc(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }
        function fmtDate(d) {
            return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
        }
        function setSync(state, label) {
            document.getElementById('syncDot').className   = 'sync-dot' + (state ? ' ' + state : '');
            document.getElementById('syncLabel').textContent = label;
        }

        // ── Lock screen ────────────────────────────────────────────
        let isFirstTime = !localStorage.getItem('pwHash');
        let unsubscribe = null;

        if (isFirstTime) {
            document.getElementById('lockIcon').textContent    = '🔑';
            document.getElementById('lockTitle').textContent   = 'Create a password';
            document.getElementById('lockSubtitle').textContent = 'Choose a password to protect your data';
            document.getElementById('lockBtn').textContent     = 'Set Password';
            document.getElementById('lockInput').placeholder   = 'Choose a password';
        }

        document.getElementById('lockBtn').addEventListener('click', attemptUnlock);
        document.getElementById('lockInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') attemptUnlock();
        });

        async function attemptUnlock() {
            const val   = document.getElementById('lockInput').value;
            const errEl = document.getElementById('lockError');
            errEl.textContent = '';
            if (!val) { errEl.textContent = 'Please enter a password.'; return; }

            if (isFirstTime) {
                if (val.length < 4) { errEl.textContent = 'Use at least 4 characters.'; return; }
                localStorage.setItem('pwHash', await sha256(val));
                isFirstTime = false;
                showApp();
            } else {
                if (await sha256(val) === localStorage.getItem('pwHash')) {
                    showApp();
                } else {
                    errEl.textContent = 'Incorrect password.';
                    document.getElementById('lockInput').value = '';
                    document.getElementById('lockInput').focus();
                }
            }
        }

        function showApp() {
            document.getElementById('lockScreen').classList.add('hidden');
            document.getElementById('app').classList.add('visible');
            document.getElementById('dateInput').valueAsDate = new Date();
            startSync();
        }

        document.getElementById('lockAppBtn').addEventListener('click', () => {
            if (unsubscribe) { unsubscribe(); unsubscribe = null; }
            document.getElementById('app').classList.remove('visible');
            document.getElementById('lockScreen').classList.remove('hidden');
            document.getElementById('lockInput').value = '';
            document.getElementById('lockError').textContent = '';
            // reset lock screen to "Welcome back" state
            document.getElementById('lockIcon').textContent     = '🔐';
            document.getElementById('lockTitle').textContent    = 'Welcome back';
            document.getElementById('lockSubtitle').textContent = 'Enter your password to continue';
            document.getElementById('lockBtn').textContent      = 'Unlock';
            document.getElementById('lockInput').placeholder    = '••••••••';
            setSync('', '');
        });

        // ── Firebase sync ──────────────────────────────────────────
        function startSync() {
            setSync('syncing', 'Syncing…');
            unsubscribe = onValue(entriesRef,
                snapshot => {
                    const raw = snapshot.val() || {};
                    const entries = Object.entries(raw)
                        .map(([key, val]) => ({ key, ...val }))
                        .sort((a, b) => new Date(b.date) - new Date(a.date));
                    renderEntries(entries);
                    setSync('synced', 'Synced');
                },
                () => setSync('error', 'Offline')
            );
        }

        // ── Render ─────────────────────────────────────────────────
        function renderEntries(entries) {
            const total = entries.reduce((s, e) => s + parseFloat(e.amount || 0), 0);
            document.getElementById('totalAmount').textContent = '€' + total.toFixed(2);

            const list = document.getElementById('entriesList');
            if (!entries.length) {
                list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>No entries yet. Add your first one above.</div>`;
                return;
            }
            list.innerHTML = entries.map(e => `
                <div class="entry-card" data-key="${esc(e.key)}" data-date="${esc(e.date)}">
                    <div class="entry-view">
                        <div class="entry-top">
                            <span class="entry-job">${esc(e.job)}</span>
                            <span class="entry-amount">€${parseFloat(e.amount).toFixed(2)}</span>
                        </div>
                        <div class="entry-meta">
                            <span class="entry-date">${fmtDate(e.date)}</span>
                            <div class="entry-actions">
                                <button class="btn-sm"            data-action="edit">Edit</button>
                                <button class="btn-sm btn-sm-danger" data-action="delete">Delete</button>
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        }

        // ── Entry actions (event delegation) ──────────────────────
        document.getElementById('entriesList').addEventListener('click', async e => {
            const btn  = e.target.closest('[data-action]');
            if (!btn) return;
            const card = btn.closest('[data-key]');
            const key  = card.dataset.key;

            switch (btn.dataset.action) {
                case 'edit':   openEdit(card); break;
                case 'cancel': closeEdit(card); break;
                case 'save':   await commitEdit(card, key); break;
                case 'delete': await deleteEntry(key); break;
            }
        });

        function openEdit(card) {
            const job    = card.querySelector('.entry-job').textContent;
            const amount = card.querySelector('.entry-amount').textContent.replace('€','').trim();
            const date   = card.dataset.date;
            card.querySelector('.entry-view').outerHTML = `
                <div class="entry-edit">
                    <div class="entry-edit-row">
                        <div>
                            <label class="form-label">Date</label>
                            <input type="date" class="form-input edit-date" value="${esc(date)}">
                        </div>
                        <div>
                            <label class="form-label">Amount (EUR)</label>
                            <input type="number" class="form-input edit-amount" value="${esc(amount)}" step="0.01" min="0">
                        </div>
                    </div>
                    <div>
                        <label class="form-label">Job / Source</label>
                        <textarea class="form-input edit-job">${esc(job)}</textarea>
                    </div>
                    <div class="entry-edit-actions">
                        <button class="btn-save"   data-action="save">Save</button>
                        <button class="btn-cancel" data-action="cancel">Cancel</button>
                    </div>
                </div>`;
        }

        function closeEdit(card) {
            // Pull fresh data for this card from Firebase once
            onValue(entriesRef, snapshot => {
                const raw = snapshot.val() || {};
                const entries = Object.entries(raw)
                    .map(([key, val]) => ({ key, ...val }))
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
                renderEntries(entries);
            }, { onlyOnce: true });
        }

        async function commitEdit(card, key) {
            const date   = card.querySelector('.edit-date').value;
            const amount = card.querySelector('.edit-amount').value;
            const job    = card.querySelector('.edit-job').value.trim();
            if (!date || !amount || !job) return;
            setSync('syncing', 'Saving…');
            await update(ref(db, 'entries/' + key), { date, amount, job });
            // onValue listener will re-render automatically
        }

        async function deleteEntry(key) {
            if (!confirm('Delete this entry?')) return;
            setSync('syncing', 'Deleting…');
            await remove(ref(db, 'entries/' + key));
        }

        // ── Add entry ──────────────────────────────────────────────
        document.getElementById('incomeForm').addEventListener('submit', async e => {
            e.preventDefault();
            const entry = {
                date:   document.getElementById('dateInput').value,
                amount: document.getElementById('amountInput').value,
                job:    document.getElementById('jobInput').value.trim()
            };
            setSync('syncing', 'Saving…');
            await push(entriesRef, entry);
            document.getElementById('amountInput').value = '';
            document.getElementById('jobInput').value   = '';
            document.getElementById('dateInput').valueAsDate = new Date();
            if (navigator.vibrate) navigator.vibrate(40);
        });

        // ── Export ─────────────────────────────────────────────────
        document.getElementById('exportBtn').addEventListener('click', () => {
            onValue(entriesRef, snapshot => {
                const entries = Object.values(snapshot.val() || {})
                    .sort((a, b) => new Date(b.date) - new Date(a.date));
                if (!entries.length) { alert('No entries to export.'); return; }
                let csv = 'Date,Amount (EUR),Job/Source\n';
                entries.forEach(e => { csv += `${e.date},${e.amount},"${e.job.replace(/"/g,'""')}"\n`; });
                Object.assign(document.createElement('a'), {
                    href:     URL.createObjectURL(new Blob([csv], { type: 'text/csv' })),
                    download: `income-${new Date().toISOString().slice(0,10)}.csv`
                }).click();
            }, { onlyOnce: true });
        });
    </script>
</body>
</html>
